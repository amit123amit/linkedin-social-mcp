name: LinkedIn Post Scheduler

on:
  # Run every 5 minutes, 24/7 — cloud fallback when laptop is off
  schedule:
    - cron: '*/5 * * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  publish-scheduled-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated scheduled-posts.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scheduler daemon
        env:
          # Store your LinkedIn access token in GitHub repo secrets:
          # Settings → Secrets and variables → Actions → New secret
          # Name: LINKEDIN_ACCESS_TOKEN
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          # Copy scheduled-posts.json from repo to expected location
          mkdir -p ~/.linkedin-social-mcp
          if [ -f scheduled-posts.json ]; then
            cp scheduled-posts.json ~/.linkedin-social-mcp/scheduled-posts.json
          else
            echo "[]" > ~/.linkedin-social-mcp/scheduled-posts.json
          fi

          # Run the scheduler
          node scheduler-daemon.mjs

          # Copy updated store back to repo
          cp ~/.linkedin-social-mcp/scheduled-posts.json scheduled-posts.json

      - name: Commit updated scheduled-posts.json
        run: |
          git config user.name  "LinkedIn Scheduler Bot"
          git config user.email "scheduler@linkedin-mcp.local"
          git add scheduled-posts.json
          # Only commit if there are changes (i.e. posts were published)
          git diff --staged --quiet || git commit -m "chore: scheduler updated post statuses [skip ci]"
          git push
