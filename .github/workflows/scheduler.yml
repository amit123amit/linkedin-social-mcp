name: LinkedIn Post Scheduler

on:
  # Run every 5 minutes, 24/7 — cloud fallback when laptop is off
  schedule:
    - cron: '*/5 * * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  publish-scheduled-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated scheduled-posts.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scheduler daemon
        env:
          # ── Recommended: refresh_token approach ───────────────────────────
          # The daemon exchanges your refresh token for a fresh access token
          # on every run. You only need to update these secrets once a year
          # (when the refresh token expires after ~365 days).
          #
          # Set these three secrets in:
          #   GitHub repo → Settings → Secrets and variables → Actions
          #
          #   LINKEDIN_CLIENT_ID      → your LinkedIn app Client ID
          #   LINKEDIN_CLIENT_SECRET  → your LinkedIn app Client Secret
          #   LINKEDIN_REFRESH_TOKEN  → from: cat ~/.linkedin-social-mcp/tokens.json | grep refresh_token
          #
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          #
          # ── Legacy fallback: static access token ──────────────────────────
          # If the three secrets above are not set, the daemon falls back to
          # LINKEDIN_ACCESS_TOKEN. This requires manual update every ~60 days.
          #
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}

        run: |
          # Copy scheduled-posts.json from repo to expected location
          mkdir -p ~/.linkedin-social-mcp
          if [ -f scheduled-posts.json ]; then
            cp scheduled-posts.json ~/.linkedin-social-mcp/scheduled-posts.json
          else
            echo "[]" > ~/.linkedin-social-mcp/scheduled-posts.json
          fi

          # Run the scheduler
          node scheduler-daemon.mjs

          # Copy updated store back to repo
          cp ~/.linkedin-social-mcp/scheduled-posts.json scheduled-posts.json

      - name: Commit updated scheduled-posts.json
        run: |
          git config user.name  "LinkedIn Scheduler Bot"
          git config user.email "scheduler@linkedin-mcp.local"
          git add scheduled-posts.json
          # Only commit if there are changes (i.e. posts were published)
          if ! git diff --staged --quiet; then
            git commit -m "chore: scheduler updated post statuses [skip ci]"
            # Pull rebase in case another commit landed since checkout
            git pull --rebase origin main
            git push
          fi
